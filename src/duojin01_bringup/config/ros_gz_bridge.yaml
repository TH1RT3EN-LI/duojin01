- ros_topic_name: /clock_raw
  ros_type_name: rosgraph_msgs/msg/Clock
  gz_topic_name: /world/empty_world/clock
  gz_type_name: ignition.msgs.Clock
  direction: GZ_TO_ROS
  # Keep clock always-on; use_sim_time nodes must see a monotonic clock.
  lazy: false

- ros_topic_name: /cmd_vel_sim
  ros_type_name: geometry_msgs/msg/Twist
  gz_topic_name: /cmd_vel
  gz_type_name: ignition.msgs.Twist
  direction: ROS_TO_GZ
  lazy: false

- ros_topic_name: /sim/odom
  ros_type_name: nav_msgs/msg/Odometry
  gz_topic_name: /sim/odom
  gz_type_name: ignition.msgs.Odometry
  direction: GZ_TO_ROS
  lazy: false

- ros_topic_name: /joint_states_raw
  ros_type_name: sensor_msgs/msg/JointState
  gz_topic_name: /joint_states
  gz_type_name: ignition.msgs.Model
  direction: GZ_TO_ROS
  lazy: false

- ros_topic_name: /scan_raw
  ros_type_name: sensor_msgs/msg/LaserScan
  gz_topic_name: /scan
  gz_type_name: ignition.msgs.LaserScan
  direction: GZ_TO_ROS
  lazy: false
