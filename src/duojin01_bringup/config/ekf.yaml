/**:
  ros__parameters:
    frequency: 30.0
    sensor_timeout: 0.2
    two_d_mode: true

    map_frame: map
    odom_frame: odom
    base_link_frame: base_footprint
    world_frame: odom

    publish_tf: true

    # xxxx0_config: [X,      Y,      Z,     # 第一组：位置 (Pose)
    #               roll,   pitch,  yaw,    # 第二组：姿态 (Orientation)
    #               vX,     vY,     vZ,     # 第三组：线速度 (Linear Velocity)
    #               vRoll,  vPitch, vYaw,   # 第四组：角速度 (Angular Velocity)
    #               aX,     aY,     aZ]     # 第五组：线性加速度 (Acceleration)
    
    odom0: /sim/odom
    odom0_queue_size: 10
    odom0_differential: false
    odom0_relative: false
    odom0_config: [true,  true,  false,
                   false, false, true,
                   true,  true,  false,
                   false, false, true,
                   false, false, false]

    imu0: /imu
    imu0_queue_size: 50
    imu0_remove_gravitational_acceleration: true
    imu0_config: [false, false, false,
                  false, false, false,
                  false, false, false,
                  false, false, true,
                  false, false, false]
